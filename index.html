    <div class="rowbtns">
      <button class="btn gray" onclick="exportPaymentsCSV()">⬇ Payments CSV</button>
    </div></div>
    <div class="card">
    <b>📌 Stock reset point</b>
    <p class="muted">${S.snapshot && S.snapshot.items
      ? 'Locked in '+new Date(S.snapshot.ts).toLocaleString('en-CA')+' by '+esc(S.snapshot.by)+' — the reset button below restores items and stock to exactly that moment.'
      : 'Not set yet — the reset button below would restore the original July 2026 starting list. Lock in your real stock first!'}</p>
    <div class="rowbtns">
      <button class="btn" onclick="pinConfirm('Lock in the CURRENT items, prices, costs and stock counts as the new reset point? From then on, the reset button restores to exactly this moment.', lockSnapshot)">📌 Lock in current stock as the reset point</button>
    </div></div>
    <div class="card">
    <b style="color:var(--red)">Danger zone</b> <span class="muted">— these ask for your admin PIN</span>
    <div class="rowbtns">
      <button class="btn red" onclick="pinConfirm('Reset ALL items to the ${S.snapshot&&S.snapshot.items?'locked-in reset point':'original starting inventory'}? Sales history is kept, but every item, price, cost and stock count goes back. This cannot be undone.', resetItems)">Reset items to the ${S.snapshot&&S.snapshot.items?'locked-in reset point':'original starting inventory'}</button>
    </div>
    <div class="rowbtns">
      <button class="btn red" onclick="pinConfirm('Delete ALL sales history? Stock is not changed, but every sale record disappears from reports and the money ledger. This cannot be undone.', ()=>DB.set(['sales'],null).then(()=>toast('Sales history cleared')))">Clear all sales history</button>
    </div></div>`;
}
let _pcFn=null;
function pinConfirm(msg, fn){
  _pcFn=fn;
  openModal(`<h3><button class="x" onclick="closeModal()">✕</button>⚠ Admin PIN required</h3>
    <p class="muted">${esc(msg)}</p>
    <label>Enter YOUR 4-digit PIN to confirm</label>
    <input id="pc_pin" type="password" inputmode="numeric" maxlength="4" autocomplete="off"
      style="font-size:26px;text-align:center;letter-spacing:10px"
      onkeydown="if(event.key==='Enter')pinConfirmGo()">
    <div style="height:12px"></div>
    <button class="btn red" onclick="pinConfirmGo()">Yes — I'm sure</button>
    <div style="height:8px"></div>
    <button class="btn gray" onclick="closeModal()">Cancel</button>`);
  setTimeout(()=>{ const el=$('pc_pin'); if(el) el.focus(); },100);
}
async function pinConfirmGo(){
  if($('pc_pin').value !== meU().pin){ toast('Wrong PIN — nothing was changed',1); $('pc_pin').value=''; return; }
  closeModal();
  const fn=_pcFn; _pcFn=null;
  await fn();
  rerender();
}
async function lockSnapshot(){
  await DB.set(['snapshot'],{ts:Date.now(), by:meU().name,
    items: JSON.parse(JSON.stringify(S.items||{}))});
  toast('Reset point locked in — resets now restore to right now'); rerender();
}
async function resetItems(){
  if(S.snapshot && S.snapshot.items){
    await DB.set(['items'], JSON.parse(JSON.stringify(S.snapshot.items)));
  }else{
    await DB.set(['items'],null); await DB.seedItemsOnly();
  }
  toast('Items reset'); rerender();
}
DB.seedItemsOnly=function(){
  const items={};
  SEED_ITEMS.forEach((it,i)=>{ items[newId()+i]={name:it.name,cat:it.cat,order:i,active:true,sizes:it.sizes}; });
  return DB.set(['items'],items);
};
function dl(name,text){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([text],{type:'text/csv'})); a.download=name; a.click();
}
function csvCell(v){ v=String(v??''); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; }
function exportSalesCSV(){
  const rows=[['Date','Time','Event','Seller','Item','Size','Qty','Unit Price','Orig Price','Unit Cost','Line Total','Line Profit','Member Sale','Payment','Owed By','Order Discount','Discount By','Voided']];
  salesSorted().reverse().forEach(([,s])=>{
    const d=new Date(s.ts);
    s.lines.forEach(l=>rows.push([d.toLocaleDateString('en-CA'),d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'}),
      s.eventName||'',s.sellerName,l.item,l.size,l.qty,l.price,l.orig||'',l.cost,
      Math.round(l.price*l.qty*100)/100,Math.round((l.price-l.cost)*l.qty*100)/100,
      l.member?'Y':'',s.payment,s.buyer||'',s.discount?s.discount.amount:'',
      s.discount?(s.discount.by||s.sellerName):'',s.voided?'Y':'']));
  });
  dl('three-aces-sales.csv',rows.map(r=>r.map(csvCell).join(',')).join('\n'));
}
function exportPaymentsCSV(){
  const rows=[['Date','Type','From','Amount','Note','Recorded By']];
  Object.values(S.payments||{}).sort((a,b)=>a.ts-b.ts).forEach(p=>
    rows.push([new Date(p.ts).toLocaleDateString('en-CA'),
      p.kind==='tab'?'Tab payment':p.kind==='payout'?'Profit payout (club → member)'
        :p.kind==='floatout'?'Cash float given out':p.kind==='floatin'?'Cash float returned':'Sales cash',
      p.from,p.amount,p.note||'',p.by]));
  dl('three-aces-payments.csv',rows.map(r=>r.map(csvCell).join(',')).join('\n'));
}
function exportStockCSV(){
  const rows=[['Item','Category','Size','Cost','Price','In Stock','Stock Value (cost)','Stock Value (retail)']];
  itemsSorted().filter(([,i])=>!i.adhoc).forEach(([,it])=>Object.keys(it.sizes).sort(sizeSort).forEach(s=>{
    const z=it.sizes[s];
    rows.push([it.name,it.cat||'',s,z.cost,z.price,z.stock||0,(z.stock||0)*z.cost,(z.stock||0)*z.price]);
  }));
  dl('three-aces-stock.csv',rows.map(r=>r.map(csvCell).join(',')).join('\n'));
}

/* ------------------------------ LOGO -------------------------------------- */
function applyLogo(){
  const l=S.settings&&S.settings.logo;
  ['hdrLogo','loginLogo'].forEach(id=>{
    const im=$(id); if(!im) return;
    if(l){ im.src=l; im.style.display=''; }
    else if(im.src.startsWith('data:')){ im.src='logo.png'; }  // logo was removed
  });
}
function uploadLogo(inp){
  const f=inp.files&&inp.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const mx=256, sc=Math.min(1, mx/Math.max(img.width,img.height));
      const cv=document.createElement('canvas');
      cv.width=Math.max(1,Math.round(img.width*sc)); cv.height=Math.max(1,Math.round(img.height*sc));
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      let data=cv.toDataURL('image/png');
      if(data.length>400000) data=cv.toDataURL('image/jpeg',0.85);
      DB.set(['settings','logo'],data).then(()=>{ applyLogo(); toast('Logo saved — it now shows on every phone'); rerender(); });
    };
    img.src=rd.result;
  };
  rd.readAsDataURL(f); inp.value='';
}

/* ------------------------------ THEME ------------------------------------- */
function applyTheme(){
  const t=localStorage.getItem('ta_theme')||'light';
  document.body.classList.toggle('dark', t==='dark');
  document.querySelectorAll('.themeIco').forEach(b=>b.textContent = t==='dark'?'☀️ Light mode':'🌙 Dark mode');
  const hb=document.querySelector('header .themeIco'); if(hb) hb.textContent = t==='dark'?'☀️':'🌙';
  const m=document.querySelector('meta[name="theme-color"]');
  if(m) m.setAttribute('content', t==='dark'?'#0d0d0d':'#ffffff');
}
function toggleTheme(){
  const cur=localStorage.getItem('ta_theme')||'light';
  localStorage.setItem('ta_theme', cur==='dark'?'light':'dark');
  applyTheme();
}
applyTheme();
