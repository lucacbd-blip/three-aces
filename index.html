<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0d0d">
<title>Three Aces — Clothing Sales</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🂡</text></svg>">
<style>
  :root{ /* LIGHT theme (default) */
    --green:#00813e; --red:#ce2b37; --white:#f4f4f4;
    --bg:#f6f6f3; --panel:#ffffff; --panel2:#efefec; --line:#d6d6d0; --line2:#e8e8e3;
    --text:#1c1c1c; --muted:#63636b; --gold:#9a7300; --star-w:#b7b7b7;
    --hdrbg:#ffffff; --navbg:#ffffff; --togoff:#c9c9c9;
    --pos:#0d7a3e; --neg:#c62828; --memberbg:#d9f2e4; --membertx:#0d6832;
  }
  body.dark{
    --green:#009246;
    --bg:#0d0d0d; --panel:#1a1a1a; --panel2:#242424; --line:#333; --line2:#222;
    --text:#f2f2f2; --muted:#9a9a9a; --gold:#e8c34a; --star-w:#f4f4f4;
    --hdrbg:#000; --navbg:#000; --togoff:#444;
    --pos:#7ee2a8; --neg:#ff8a80; --memberbg:#00331b; --membertx:#7ee2a8;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  body{padding-bottom:calc(70px + env(safe-area-inset-bottom));}
  button{font-family:inherit;}
  input,select{font-family:inherit;font-size:16px;background:var(--panel2);color:var(--text);
    border:1px solid var(--line);border-radius:8px;padding:10px;width:100%;}
  input:focus,select:focus{outline:2px solid var(--green);}
  label{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px;text-transform:uppercase;letter-spacing:.5px;}

  /* Header */
  header{position:sticky;top:0;z-index:50;background:var(--hdrbg);
    border-bottom:2px solid var(--line);padding:10px 14px calc(8px);display:flex;align-items:center;gap:10px;}
  .tricolor{height:4px;background:linear-gradient(90deg,var(--green) 33%,var(--white) 33% 66%,var(--red) 66%);
    position:fixed;top:0;left:0;right:0;z-index:60;}
  header img.logo{height:44px;width:44px;object-fit:contain;border-radius:8px;}
  .brand{flex:1;line-height:1.1;}
  .brand .stars{font-size:11px;letter-spacing:3px;}
  .stars .g{color:var(--green);} .stars .w{color:var(--star-w);} .stars .r{color:var(--red);}
  .brand h1{margin:0;font-size:17px;letter-spacing:2px;font-weight:800;}
  .brand small{color:var(--muted);font-size:10px;letter-spacing:.5px;display:block;}
  .userchip{background:var(--panel2);border:1px solid var(--line);border-radius:20px;
    padding:6px 12px;font-size:13px;color:var(--text);display:flex;align-items:center;gap:6px;}
  .userchip b{color:var(--gold);}
  .mode-banner{background:#3a2f00;color:#ffd54f;text-align:center;font-size:12px;padding:5px;}
  .mode-banner.online{background:#00331b;color:#7ee2a8;}

  /* Views */
  .view{display:none;padding:14px;max-width:760px;margin:0 auto;}
  .view.active{display:block;}
  h2{font-size:15px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin:18px 0 10px;}
  h2:first-child{margin-top:4px;}

  /* Login */
  #login{max-width:420px;margin:0 auto;padding:24px 18px;}
  .login-logo{text-align:center;margin:18px 0 26px;}
  .login-logo img{max-width:170px;border-radius:14px;}
  .login-logo .stars{font-size:22px;letter-spacing:10px;margin-top:8px;}
  .login-logo h1{margin:6px 0 0;font-size:26px;letter-spacing:4px;}
  .login-logo p{color:var(--muted);margin:4px 0 0;font-size:12px;letter-spacing:1px;}
  /* PIN pad */
  .pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px;}
  .pinpad button{padding:16px;font-size:22px;border-radius:12px;border:1px solid var(--line);
    background:var(--panel2);color:var(--text);cursor:pointer;}
  .pinpad button:active{background:var(--line);}
  .pindots{text-align:center;font-size:28px;letter-spacing:12px;min-height:40px;color:var(--gold);}
  .pinerr{color:var(--red);text-align:center;font-size:13px;min-height:18px;}

  /* Sell screen */
  .catbar{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:6px;}
  .catbar button{flex:0 0 auto;background:var(--panel);border:1px solid var(--line);color:var(--muted);
    border-radius:18px;padding:8px 14px;font-size:13px;cursor:pointer;white-space:nowrap;}
  .catbar button.on{background:var(--green);border-color:var(--green);color:#fff;font-weight:700;}
  .itemcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:10px;}
  .itemcard .top{display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
  .itemcard .nm{font-size:16px;font-weight:700;}
  .itemcard .meta{font-size:12px;color:var(--muted);margin-top:2px;}
  .itemcard .price{color:var(--gold);font-weight:700;font-size:15px;}
  .sizerow{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
  .sizebtn{min-width:64px;padding:10px 8px;border-radius:10px;border:1px solid var(--line);
    background:var(--panel2);color:var(--text);font-size:14px;font-weight:700;cursor:pointer;text-align:center;}
  .sizebtn small{display:block;font-weight:400;font-size:11px;color:var(--muted);}
  .sizebtn.out{opacity:.35;}
  .sizebtn.low small{color:var(--gold);}
  .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:8px;vertical-align:baseline;border:1px solid #555;}

  /* Cart */
  #cartbar{position:fixed;bottom:calc(62px + env(safe-area-inset-bottom));left:0;right:0;z-index:40;
    background:var(--green);color:#fff;padding:12px 18px;display:none;justify-content:space-between;
    align-items:center;font-size:16px;font-weight:700;cursor:pointer;}
  #cartbar .n{background:#fff;color:var(--green);border-radius:50%;width:26px;height:26px;
    display:inline-flex;align-items:center;justify-content:center;margin-right:10px;}
  .cartline{display:flex;justify-content:space-between;align-items:center;gap:8px;
    border-bottom:1px solid var(--line);padding:10px 0;}
  .cartline .d{flex:1;}
  .cartline .nm{font-weight:700;}
  .cartline .sub{font-size:12px;color:var(--muted);}
  .saleflag{display:inline-block;background:#ffe1e1;color:#a31515;border-radius:6px;
    font-size:11px;font-weight:800;padding:2px 6px;margin-left:6px;}
  body.dark .saleflag{background:#4a1010;color:#ff9c9c;}
  .memberflag{display:inline-block;background:var(--memberbg);color:var(--membertx);border-radius:6px;
    font-size:11px;padding:2px 6px;margin-left:6px;}
  .qtyctl{display:flex;align-items:center;gap:8px;}
  .qtyctl button{width:32px;height:32px;border-radius:8px;border:1px solid var(--line);
    background:var(--panel2);color:var(--text);font-size:18px;cursor:pointer;}
  .cart-total{display:flex;justify-content:space-between;font-size:20px;font-weight:800;margin:14px 0;}
  .payrow{display:flex;gap:10px;margin:10px 0 16px;}
  .payrow button{flex:1;padding:12px;border-radius:10px;border:1px solid var(--line);
    background:var(--panel2);color:var(--text);font-size:15px;cursor:pointer;}
  .payrow button.on{background:var(--green);border-color:var(--green);color:#fff;font-weight:700;}

  /* Generic buttons */
  .btn{display:block;width:100%;padding:14px;border-radius:12px;border:none;font-size:16px;
    font-weight:700;cursor:pointer;background:var(--green);color:#fff;}
  .btn.red{background:var(--red);} .btn.gray{background:var(--panel2);color:var(--text);border:1px solid var(--line);}
  .btn.small{width:auto;display:inline-block;padding:8px 14px;font-size:13px;border-radius:8px;}
  .btn:disabled{opacity:.5;}
  .rowbtns{display:flex;gap:10px;margin-top:10px;}
  .rowbtns .btn{flex:1;}

  /* Tables */
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{color:var(--muted);text-align:left;font-weight:600;font-size:11px;text-transform:uppercase;
    letter-spacing:.5px;padding:8px 6px;border-bottom:1px solid var(--line);}
  td{padding:9px 6px;border-bottom:1px solid var(--line2);}
  td.r,th.r{text-align:right;}
  .pos{color:var(--pos);} .neg{color:var(--neg);} .goldtxt{color:var(--gold);}

  /* Cards / stats */
  .statgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px;}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px;}
  .stat .v{font-size:22px;font-weight:800;}
  .stat .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
  .stat.green .v{color:var(--pos);} .stat.gold .v{color:var(--gold);} .stat.red .v{color:var(--neg);}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px;}
  .salecard{border-left:4px solid var(--green);}
  .salecard.voided{border-left-color:var(--red);opacity:.55;}
  .salecard .hd{display:flex;justify-content:space-between;font-weight:700;}
  .salecard .lines{font-size:13px;color:var(--muted);margin-top:6px;}
  .voidtag{color:var(--red);font-weight:700;font-size:11px;text-transform:uppercase;}

  /* Admin tabs */
  .tabbar{display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;}
  .tabbar button{flex:0 0 auto;background:var(--panel);border:1px solid var(--line);color:var(--muted);
    border-radius:8px;padding:9px 13px;font-size:13px;cursor:pointer;}
  .tabbar button.on{background:var(--panel2);color:var(--gold);border-color:var(--gold);font-weight:700;}

  /* Bottom nav */
  nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:var(--navbg);border-top:1px solid var(--line);
    display:none;justify-content:space-around;padding:6px 0 calc(6px + env(safe-area-inset-bottom));}
  nav button{background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 14px;}
  nav button .ic{font-size:20px;}
  nav button.on{color:var(--gold);}

  /* Modal */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:none;
    align-items:flex-end;justify-content:center;}
  .modal-bg.open{display:flex;}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:18px 18px 0 0;
    width:100%;max-width:560px;max-height:88vh;overflow-y:auto;padding:18px 16px calc(24px + env(safe-area-inset-bottom));}
  .modal h3{margin:0 0 12px;font-size:17px;}
  .modal .x{float:right;background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:0 4px;}
  .sizeedit{display:grid;grid-template-columns:1.1fr 1fr 1fr .9fr .9fr 30px;gap:5px;align-items:center;margin-bottom:6px;}
  .sizeedit input,.sizeedit select{padding:8px;font-size:14px;}
  .sizeedit .del{background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;}
  .sehead{display:grid;grid-template-columns:1.1fr 1fr 1fr .9fr .9fr 30px;gap:5px;font-size:10px;
    color:var(--muted);text-transform:uppercase;margin-bottom:4px;}
  .rsrow{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;align-items:center;margin-bottom:6px;font-size:13px;}
  .rsrow input{padding:8px;font-size:14px;}
  .rshead{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;}

  /* Print (Save as PDF) */
  .printhead{display:none;}
  @media print{
    body{background:#fff !important;color:#000;padding:0;}
    .tricolor,header,nav,#cartbar,#modeBanner,.tabbar,.noprint,.btn,button{display:none !important;}
    .view{display:none;} .view.active{display:block;padding:0;max-width:none;}
    .printhead{display:block;text-align:center;margin-bottom:14px;color:#000;}
    .printhead h1{margin:0;font-size:20px;letter-spacing:2px;}
    .printhead p{margin:2px 0;font-size:12px;color:#333;}
    .card,.stat{background:#fff !important;border:1px solid #bbb !important;color:#000;break-inside:avoid;}
    .stat .v,.stat .l,td,th,h2,b,.goldtxt,.pos,.neg,.muted{color:#000 !important;}
    td,th{border-bottom:1px solid #ddd;}
    h2{color:#000;}
  }
  .switchrow{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #222;}
  .switchrow .t{font-size:14px;} .switchrow .s{font-size:12px;color:var(--muted);}
  .toggle{width:52px;height:30px;border-radius:15px;background:var(--togoff);border:none;position:relative;cursor:pointer;flex:0 0 auto;}
  .toggle.on{background:var(--green);}
  .toggle::after{content:'';position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;
    background:#fff;transition:left .15s;}
  .toggle.on::after{left:25px;}
  .searchbox{margin-bottom:10px;}
  /* Stock grid (all items × all sizes) */
  .gridwrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px;background:var(--panel);}
  .stockgrid{border-collapse:collapse;min-width:100%;}
  .stockgrid th,.stockgrid td{padding:8px 9px;border-bottom:1px solid var(--line2);white-space:nowrap;}
  .stockgrid tr:last-child td{border-bottom:none;}
  .stockgrid .itc{position:sticky;left:0;background:var(--panel);text-align:left;z-index:1;
    min-width:120px;max-width:175px;white-space:normal;line-height:1.25;font-weight:600;}
  .stockgrid td.c{text-align:center;}
  .stockgrid .dim{color:var(--line);}
  .dim{color:var(--muted);opacity:.6;}
  /* attendance grid */
  .attP{color:var(--pos);font-weight:800;} .attL{color:var(--gold);font-weight:800;}
  .attA{color:var(--neg);font-weight:800;} .attAN{color:#e67e22;font-weight:800;}
  .attNP{color:var(--muted);font-weight:800;}
  .attcell{cursor:pointer;user-select:none;min-width:34px;}
  .stockgrid .lowc{color:var(--gold);font-weight:700;}
  .stockgrid th.sz{cursor:pointer;user-select:none;}
  .stockgrid th.sz.on{color:var(--gold);}
  .stockgrid .totrow td{border-top:2px solid var(--line);background:var(--panel2);font-weight:800;}
  .muted{color:var(--muted);font-size:13px;}
  .empty{color:var(--muted);text-align:center;padding:30px 10px;font-size:14px;}
  .toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;
    padding:12px 22px;border-radius:24px;font-weight:700;z-index:200;display:none;box-shadow:0 4px 18px rgba(0,0,0,.5);}
  .toast.err{background:var(--red);}
</style>
</head>
<body>
<div class="tricolor"></div>
<div id="modeBanner" class="mode-banner" style="display:none"></div>

<header id="appHeader" style="display:none">
  <img class="logo" id="hdrLogo" src="logo.png" onerror="this.style.display='none'">
  <div class="brand">
    <div class="stars"><span class="g">★</span> <span class="w">★</span> <span class="r">★</span></div>
    <h1>THREE ACES</h1>
    <small>ITALIAN CANADIAN CULTURAL CLUB</small>
  </div>
  <button class="userchip themeIco" onclick="toggleTheme()" title="Light/dark mode">🌙</button>
  <button class="userchip" onclick="logout()"><b id="chipName"></b> ⎋</button>
</header>

<!-- LOGIN -->
<div id="login" class="view active">
  <div class="login-logo">
    <img id="loginLogo" src="logo.png" onerror="this.style.display='none'">
    <div class="stars"><span class="g">★</span> <span class="w">★</span> <span class="r">★</span></div>
    <h1>THREE ACES</h1>
    <p>ITALIAN CANADIAN CULTURAL CLUB</p>
    <p style="color:var(--gold);margin-top:10px">Clothing Sales &amp; Inventory</p>
  </div>
  <div style="max-width:340px;margin:0 auto">
    <label>Name</label>
    <input id="loginName" autocomplete="off" autocapitalize="words" placeholder="Type your name"
      oninput="$('pinErr').textContent=''">
    <label>PIN</label>
    <div class="pindots" id="pinDots"></div>
    <div class="pinerr" id="pinErr"></div>
    <div class="pinpad">
      <button onclick="pinKey('1')">1</button><button onclick="pinKey('2')">2</button><button onclick="pinKey('3')">3</button>
      <button onclick="pinKey('4')">4</button><button onclick="pinKey('5')">5</button><button onclick="pinKey('6')">6</button>
      <button onclick="pinKey('7')">7</button><button onclick="pinKey('8')">8</button><button onclick="pinKey('9')">9</button>
      <button onclick="pinKey('C')">C</button><button onclick="pinKey('0')">0</button><button onclick="pinKey('⌫')">⌫</button>
    </div>
  </div>
  <div style="text-align:center;margin-top:22px">
    <button class="btn gray small themeIco" onclick="toggleTheme()">🌙</button>
    <p class="muted" id="verTag" style="font-size:11px;margin-top:14px"></p>
  </div>
</div>

<!-- SELL -->
<div id="sell" class="view">
  <div class="catbar" id="catBar"></div>
  <div id="itemList"></div>
</div>

<!-- STOCK -->
<div id="stock" class="view">
  <h2>Current Stock</h2>
  <input class="searchbox" id="stockSearch" placeholder="Search items…" oninput="renderStock()">
  <div id="stockList"></div>
</div>

<!-- SALES LOG -->
<div id="saleslog" class="view">
  <h2>Sales — Today</h2>
  <div id="salesList"></div>
</div>

<!-- MY MONEY (members with a profit share) -->
<div id="mymoney" class="view">
  <div id="myMoneyBody"></div>
</div>

<!-- MY CLUB (members: their attendance + sponsor, no club money) -->
<div id="myclub" class="view">
  <div id="myClubBody"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="view">
  <div class="tabbar" id="adminTabs"></div>
  <div id="adminBody"></div>
</div>

<div id="cartbar" onclick="openCart()">
  <span><span class="n" id="cartN">0</span>View Sale</span>
  <span id="cartT">$0</span>
</div>

<nav id="nav"></nav>

<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBox"></div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ==========================================================================
   FIREBASE CONFIG — paste your config object between the braces below and
   the app switches from "Local test mode" to live multi-phone sync.
   Example:
   const FIREBASE_CONFIG = {
     apiKey: "AIza....", authDomain: "three-aces.firebaseapp.com",
     databaseURL: "https://three-aces-default-rtdb.firebaseio.com",
     projectId: "three-aces", appId: "1:1234:web:abcd"
   };
   ========================================================================== */
const APP_VERSION = 'v3.9.2';
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCLlwbfE4ZilKtY5AakOUOl_h7_0uP-VQw",
  authDomain: "three-aces.firebaseapp.com",
  databaseURL: "https://three-aces-default-rtdb.firebaseio.com",
  projectId: "three-aces",
  storageBucket: "three-aces.firebasestorage.app",
  messagingSenderId: "1078244282125",
  appId: "1:1078244282125:web:14fa73c7622a41640c6a44"
};

/* =========================== STARTING DATA ================================
   Seeded automatically the first time the app runs (from your stock-count
   photos + Sep 25 2024 cost sheet). After that, manage everything in
   Admin → Items. NOTE: Ski Mask cost/price were not on the cost sheet —
   placeholder $10 cost / $20 price. Fix in Admin → Items!
   ========================================================================== */
const SIZE_ORDER = ['XS','S','M','L','XL','2XL','3XL','4XL','5XL','One Size'];
function _std(costs, prices, sizeList, stock){
  // costs=[base,2xl,3xl,4xl,5xl]  prices=[S-XL,2-3XL,4-5XL]
  const cFor = s=>({'2XL':costs[1],'3XL':costs[2],'4XL':costs[3],'5XL':costs[4]}[s] ?? costs[0]);
  const pFor = s=>({'2XL':prices[1],'3XL':prices[1],'4XL':prices[2],'5XL':prices[2]}[s] ?? prices[0]);
  const out={};
  sizeList.forEach(s=>{ out[s]={cost:cFor(s), price:pFor(s), stock:(stock[s]||0), reorder:2}; });
  return out;
}
const S6=['S','M','L','XL','2XL','3XL'], S7=S6.concat(['4XL']), S8=S7.concat(['5XL']);
const SEED_ITEMS = [
 {name:'Sleeveless T (Red)',   cat:'Sleeveless', sizes:_std([13,14,15,16,17],[35,40,45],S6,{S:5,M:1,L:7,'2XL':5,'3XL':1})},
 {name:'Sleeveless T (White)', cat:'Sleeveless', sizes:_std([13,14,15,16,17],[35,40,45],S6,{S:1,M:4,L:3,XL:1,'2XL':2,'3XL':2})},
 {name:'Sleeveless T (Black)', cat:'Sleeveless', sizes:_std([13,14,15,16,17],[35,40,45],S6,{S:2,M:4,L:1,'3XL':1})},
 {name:'Ladies T (Black)',     cat:'Ladies',     sizes:_std([14,15,16,17,18],[40,45,50],S6,{M:1,XL:4,'2XL':6})},

let _ref=null, _ready=false, _onChange=()=>{};

let _initErr=null;
function updateBanner(){
  const b=$('modeBanner');
  if(!CLOUD){
    b.style.display='block'; b.className='mode-banner';
    b.textContent='⚠ LOCAL TEST MODE — data stays on this device only. Set up Firebase to sync phones (see README).';

/* Cloud mode talks to the Firebase Realtime Database over plain HTTPS (its REST
   API) — no SDK, no sign-in service, nothing for corporate networks to choke on.
   Requires the database rules to be public (".read": true, ".write": true).   */
let _lastJson='', _pollTimer=null;
function _restUrl(pathArr){
  const base=FIREBASE_CONFIG.databaseURL.replace(/\/+$/,'')+'/threeaces';
  return base + (pathArr&&pathArr.length ? '/'+pathArr.map(encodeURIComponent).join('/') : '') + '.json';
}
function _applyLocal(path, val){   // mirror a write into local state instantly
  let o=S;
  for(let i=0;i<path.length-1;i++){ o[path[i]] = o[path[i]]||{}; o=o[path[i]]; }
  if(val===null) delete o[path[path.length-1]]; else o[path[path.length-1]]=val;
}
const DB = {
  async init(onChange){
    _onChange = onChange;
    if(CLOUD){
      updateBanner();   // show "connecting…" right away
      setTimeout(()=>{ if(!_ready && !_initErr){
        _initErr='Still cannot reach the club database after 20 seconds. Check in Firebase: Realtime Database → Rules — both ".read" and ".write" must be exactly true (then Publish). If they already are, this network is blocking '+FIREBASE_CONFIG.databaseURL.replace('https://','')+'.';
        updateBanner(); } },20000);
      await this._refresh();
      // live sync: re-check every 3 seconds, plus instantly when the app regains focus
      _pollTimer=setInterval(()=>{ if(!document.hidden) this._refresh(); },3000);
      window.addEventListener('focus',()=>this._refresh());
    }else{
      const raw = localStorage.getItem('threeaces');
      if(raw){ S = JSON.parse(raw); }
      else{ this.seed(); }
      _ready=true; setTimeout(_onChange,0);
    }
  },
  async _refresh(){
    try{
      const r=await fetch(_restUrl([]),{cache:'no-store'});
      if(!r.ok) throw new Error('HTTP '+r.status+(r.status===401||r.status===403?' — the database Rules are not public. In Firebase: Realtime Database → Rules → set ".read" and ".write" to true → Publish.':''));
      const txt=await r.text();
      if(txt==='null'){ if(!_ready){ await this.seed(); } return true; }
      if(txt!==_lastJson){
        _lastJson=txt;
        S=Object.assign({items:{},users:{},sales:{},settings:{},restocks:{},payments:{}}, JSON.parse(txt)||{});
        _initErr=null; _ready=true; updateBanner(); _onChange();
      }
      return true;
    }catch(e){
      if(!_ready){ _initErr='Cannot reach the club database ('+(e.message||e)+').'; updateBanner(); }
      return false;
    }
  },
  async seed(){
    const items={}, users={};
    SEED_ITEMS.forEach((it,i)=>{ items[newId()+i]={name:it.name,cat:it.cat,order:i,active:true,sizes:it.sizes}; });
    SEED_USERS.forEach((u,i)=>{ users[newId()+'u'+i]=u; });
    const full={items,users,sales:{},settings:SEED_SETTINGS,restocks:{},payments:{}};
    if(CLOUD){
      try{
        const r=await fetch(_restUrl([]),{method:'PUT',body:JSON.stringify(full)});
        if(!r.ok) throw new Error('HTTP '+r.status);
        _lastJson=JSON.stringify(full); S=full; _initErr=null; _ready=true; updateBanner(); _onChange();
      }catch(e){
        _initErr='Could not write the starting data ('+(e.message||e)+'). Check the database Rules are public and published, then refresh.';
        updateBanner();
      }
    }
    else{ S=full; this._persist(); _onChange(); }
  },
  _persist(){ localStorage.setItem('threeaces', JSON.stringify(S)); },
  async set(path, val){          // path: array e.g. ['items', id, 'name']
    if(CLOUD){
      const r=await fetch(_restUrl(path),{method: val===null?'DELETE':'PUT', body: val===null?undefined:JSON.stringify(val)});
      if(!r.ok){ toast('Save failed — check connection',1); throw new Error('save failed'); }
      _applyLocal(path,val); _lastJson=''; _onChange();
      return;
    }
    _applyLocal(path,val);
    this._persist(); _onChange(); return Promise.resolve();
  },
  push(path, val){
    const id=newId();
    return this.set(path.concat(id), val).then(()=>id);
  },
  // atomic-ish stock change; resolves false if it would go negative.
  // Cloud mode uses the database's ETag compare-and-set so two phones can't
  // both sell the last piece.
  async txnStock(itemId, size, delta){
    if(!S.items[itemId] || !S.items[itemId].sizes || !S.items[itemId].sizes[size]) return false; // item deleted
    if(CLOUD){
      const u=_restUrl(['items',itemId,'sizes',size,'stock']);
      for(let attempt=0; attempt<6; attempt++){
        try{
          const g=await fetch(u,{headers:{'X-Firebase-ETag':'true'},cache:'no-store'});
          if(!g.ok) return false;
          const etag=g.headers.get('ETag');
          const cur=(await g.json())||0;
          if(cur+delta<0) return false;
          const p=await fetch(u,{method:'PUT',
            headers: etag? {'if-match':etag} : {},
            body: JSON.stringify(cur+delta)});
          if(p.ok){
            _applyLocal(['items',itemId,'sizes',size,'stock'],cur+delta);
            _lastJson=''; _onChange();
            return true;
          }
          if(p.status!==412) return false;   // 412 = someone beat us; retry
        }catch(e){ return false; }
      }
      return false;
    }
    const sz = S.items[itemId] && S.items[itemId].sizes[size];
    if(!sz || (sz.stock||0)+delta < 0) return Promise.resolve(false);
    sz.stock=(sz.stock||0)+delta; this._persist(); _onChange();
    return Promise.resolve(true);
  }
};

/* ------------------------- ATTACHED FILE STORE -----------------------------
   Invoices (photos, PDFs, Word files) are stored OUTSIDE the main /threeaces
   node so the 3-second live sync never has to download them — a file is only
   fetched when someone taps 📎 to view it.                                   */
function _filesUrl(id){ return FIREBASE_CONFIG.databaseURL.replace(/\/+$/,'')+'/threeacesFiles/'+encodeURIComponent(id)+'.json'; }
async function fileSave(id,obj){        // obj = {name, type, data(dataURL)}
  if(CLOUD){
    const r=await fetch(_filesUrl(id),{method:'PUT',body:JSON.stringify(obj)});
    if(!r.ok) throw new Error('file save failed');
    return;
  }
  const all=JSON.parse(localStorage.getItem('threeacesFiles')||'{}');
  all[id]=obj; localStorage.setItem('threeacesFiles',JSON.stringify(all));
}
async function fileLoad(id){
  if(CLOUD){
    try{ const r=await fetch(_filesUrl(id),{cache:'no-store'}); return r.ok? await r.json() : null; }
    catch(e){ return null; }
  }
  return (JSON.parse(localStorage.getItem('threeacesFiles')||'{}'))[id]||null;
}

function sizeSort(a,b){ const ia=SIZE_ORDER.indexOf(a), ib=SIZE_ORDER.indexOf(b);

function itemsSorted(){ return Object.entries(S.items||{}).filter(([,i])=>i.active!==false)

function salePriceOf(it,z){  // item-level "% off" sale price, rounded to cents
  const p=it.salePct||0;
  return p>0 ? Math.round(z.price*(100-p))/100 : z.price;

function soldMap(){ // units sold per item (non-void, all time) — powers "best sellers" order
  const m={};
  Object.values(S.sales||{}).forEach(s=>{ if(s.voided) return;
    (s.lines||[]).forEach(l=>{ m[l.itemId]=(m[l.itemId]||0)+l.qty; }); });

}

document.addEventListener('keydown', e=>{

function addToCart(itemId,size){
  const it=S.items[itemId], z=it.sizes[size];
  if(!it.adhoc){
    const inCart=cart.filter(l=>l.itemId===itemId&&l.size===size).reduce((n,l)=>n+l.qty,0);
    if(inCart+1 > (z.stock||0)){ toast('Only '+(z.stock||0)+' left in stock',1); return; }
  }
  const ex=cart.find(l=>l.itemId===itemId&&l.size===size&&!l.member);
  if(ex) ex.qty++;
  else cart.push({itemId, item:it.name, size, qty:1, price:salePriceOf(it,z), regular:z.price,
    salePct:it.salePct||0, cost:z.cost, member:false, adhoc:!!it.adhoc});
  toast(it.name+' '+size+' added');
  renderCartBar();
}
// Effective prices with the volume discount spread across lines in proportion
// to their value — so per-item profit stays correct.
function discountedLines(){
  const base=cart.map(l=>{
    const unit=l.member?l.cost:l.price;
    return {l, unit, tot:unit*l.qty, newTot:unit*l.qty};
  });
  const subtotal=Math.round(base.reduce((a,x)=>a+x.tot,0)*100)/100;
  let discAmt=0;
  if(cartDisc && subtotal>0){
    discAmt = cartDisc.type==='pct'
      ? subtotal*Math.min(100,cartDisc.value)/100
      : Math.min(cartDisc.value, subtotal);
    discAmt=Math.round(discAmt*100)/100;
    let remaining=Math.round(discAmt*100);
    base.forEach((x,i)=>{
      const share = i===base.length-1 ? remaining
        : Math.round(discAmt*100 * x.tot/subtotal);
      remaining-=share;
      x.newTot=(Math.round(x.tot*100)-share)/100;
      x.unit=Math.round(x.newTot/x.l.qty*10000)/10000;
    });
  }
  const total=Math.round(base.reduce((a,x)=>a+x.newTot,0)*100)/100;
  return {base, subtotal, discAmt, total};
}
function renderCartBar(){
  const n=cart.reduce((a,l)=>a+l.qty,0);
  $('cartbar').style.display = n&&me ? 'flex':'none';
  $('cartN').textContent=n;
  $('cartT').textContent=fmt(n?discountedLines().total:0);
}

  if(!cart.length) return;

let _dmType='pct';
function discountModal(){
  _dmType=cartDisc?cartDisc.type:'pct';
  openModal(`<h3><button class="x" onclick="openCart()">✕</button>％ Volume Discount</h3>
    <p class="muted">Applies to the whole sale, spread across every item so profit tracking stays accurate. Enter YOUR PIN to authorize it — the discount is recorded under your name.</p>
    <label>Discount type</label>
    <div class="payrow">
      <button type="button" id="dmPct" class="${_dmType==='pct'?'on':''}" onclick="_dmType='pct';this.classList.add('on');$('dmAmt').classList.remove('on');$('dmValLab').textContent='Percent off (e.g. 10 = 10%)'">Percent %</button>
      <button type="button" id="dmAmt" class="${_dmType==='amt'?'on':''}" onclick="_dmType='amt';this.classList.add('on');$('dmPct').classList.remove('on');$('dmValLab').textContent='Dollars off the total (e.g. 5 or 5.50)'">Dollars $</button>
    </div>

    <input id="dm_val" type="text" inputmode="decimal" autocomplete="off"
      value="${cartDisc?cartDisc.value:''}" placeholder="0">
    <label>Your PIN (authorizes the discount — recorded under your name)</label>
    <input id="dm_pin" type="password" inputmode="numeric" maxlength="4" autocomplete="off"
      style="font-size:22px;text-align:center;letter-spacing:8px">
    <div style="height:12px"></div>
    <button class="btn" onclick="applyDiscount()">✓ Apply Discount</button>
    <div style="height:8px"></div>
    <button class="btn gray" onclick="openCart()">Back to sale</button>`);
  setTimeout(()=>{ const el=$('dm_val'); if(el) el.focus(); },100);
}
function applyDiscount(){
  const pin=$('dm_pin').value;
  if(pin!==meU().pin){ toast('That\'s not your PIN — discount not applied',1); $('dm_pin').value=''; return; }
  // forgiving parse: accepts "5", "5.50", "$5", "10%"…
  const v=parseFloat(String($('dm_val').value).replace(/[^0-9.]/g,''))||0;
  if(v<=0){ toast('Enter the discount amount',1); return; }
  if(_dmType==='pct' && v>100){ toast('Percent can\'t be over 100',1); return; }
  cartDisc={type:_dmType, value:Math.round(v*100)/100, by:meU().name};
  toast('Discount applied');
  openCart(); renderCartBar();
}
function toggleMember(i){
  cart[i].member=!cart[i].member; openCart(); renderCartBar();
}
function qty(i,d){
  const l=cart[i];
  if(d>0 && !l.adhoc){
    const z=S.items[l.itemId].sizes[l.size];
    const inCart=cart.filter(x=>x.itemId===l.itemId&&x.size===l.size).reduce((n,x)=>n+x.qty,0);
    if(inCart+1>(z.stock||0)){ toast('No more stock',1); return; }
  }
  l.qty+=d; if(l.qty<=0) cart.splice(i,1);
  if(!cart.length){ closeModal(); } else openCart();
  renderCartBar();
}
let _busy=false;
async function checkout(){
  if(_busy||!cart.length) return;
  if(payMethod==='Pay Later' && !cartBuyer){ toast('Pick which member owes this',1); return; }
  _busy=true;
  const done=[];
  try{
    for(const l of cart){
      if(l.adhoc) continue;   // ad-hoc items don't touch stock
      const ok=await DB.txnStock(l.itemId,l.size,-l.qty);
      if(!ok){ for(const d of done) await DB.txnStock(d.itemId,d.size,d.qty);
        toast('Not enough stock for '+l.item+' '+l.size+' — sale cancelled',1); _busy=false; return; }
      done.push(l);
    }
    const u=meU();
    const {base, discAmt, total}=discountedLines();
    const sale={ts:Date.now(), sellerId:me, sellerName:u.name, sellerPct:u.profitPct||0,
      payment:payMethod, buyer:payMethod==='Pay Later'?cartBuyer:null,
      voided:false, eventName:(S.settings&&S.settings.eventName)||'',
      discount: cartDisc? {type:cartDisc.type, value:cartDisc.value, amount:discAmt, by:cartDisc.by||u.name} : null,
      lines:base.map(x=>({itemId:x.l.itemId,item:x.l.item,size:x.l.size,qty:x.l.qty,
        price:x.unit, orig:(x.unit!==(x.l.regular??x.l.price))?(x.l.regular??x.l.price):null,
        salePct:x.l.salePct||0,
        cost:x.l.cost, member:!!x.l.member, adhoc:!!x.l.adhoc})),
      total};
    await DB.push(['sales'], sale);
    const msg = sale.payment==='Pay Later'
      ? 'Sale recorded — '+fmt(sale.total)+' on '+sale.buyer+"'s tab"
      : 'Sale recorded — '+fmt(sale.total)+' '+sale.payment;
    cart=[]; cartBuyer=''; cartDisc=null; payMethod='Cash'; closeModal(); renderCartBar();
    toast(msg);
  }finally{ _busy=false; }
}

function renderStock(){
  const q=($('stockSearch').value||'').toLowerCase();
  let items=displayItemsSorted().filter(([,i])=>!i.adhoc && i.name.toLowerCase().includes(q));
  const toggle=`<div class="payrow noprint" style="margin-bottom:10px">
    <button class="${stockView==='grid'?'on':''}" onclick="stockView='grid';rerender()">▦ Everything in one grid</button>
    <button class="${stockView==='cards'?'on':''}" onclick="stockView='cards';rerender()">☰ By item</button></div>`;
  if(stockView==='grid'){
    // one-page matrix: every item down the side, every size across the top
    const cols=[...new Set(items.flatMap(([,it])=>Object.keys(it.sizes||{})))].sort(sizeSort);
    if(stockSortSize && !cols.includes(stockSortSize)) stockSortSize=null;
    if(stockSortSize) items=[...items].sort((a,b)=>
      (((b[1].sizes||{})[stockSortSize]||{}).stock||0)-(((a[1].sizes||{})[stockSortSize]||{}).stock||0));
    const grand=items.reduce((n,[,it])=>n+totalStock(it),0);
    $('stockList').innerHTML= toggle + printHead('Stock Count','All items and sizes — '+grand+' pieces total') +
      `<p class="muted noprint">Looking for a size? Tap a size column heading (e.g. <b>M</b>) to sort by what's available in that size — tap it again to undo. Gold numbers are running low, — means sold out.</p>
      <div class="gridwrap"><table class="stockgrid">
        <tr><th class="itc">Item</th>${cols.map(s=>
          `<th class="sz ${stockSortSize===s?'on':''}" onclick="stockSortSize=${stockSortSize===s?'null':`'${esc(s)}'`};rerender()">${esc(s)}${stockSortSize===s?' ▼':''}</th>`).join('')}
          <th class="r">Total</th></tr>
        ${items.map(([id,it])=>`<tr><td class="itc">${colorDot(it)}${esc(it.name)}</td>${cols.map(s=>{
            const z=(it.sizes||{})[s];
            if(!z) return '<td class="c dim">·</td>';
            const st=z.stock||0;
            return `<td class="c ${st===0?'dim':st<=(z.reorder??2)?'lowc':''}">${st===0?'—':st}</td>`;
          }).join('')}<td class="r"><b>${totalStock(it)}</b></td></tr>`).join('')
          || `<tr><td colspan="${cols.length+2}" class="empty">Nothing matches.</td></tr>`}
        ${items.length?`<tr class="totrow"><td class="itc">TOTAL</td>${cols.map(s=>
          `<td class="c">${items.reduce((n,[,it])=>n+((((it.sizes||{})[s])||{}).stock||0),0)}</td>`).join('')}
          <td class="r">${grand}</td></tr>`:''}
      </table></div>
      <div class="rowbtns noprint" style="margin-top:10px">
        <button class="btn gray" onclick="window.print()">🖨 Print this view</button>
        <button class="btn" onclick="printStockSheet()">🖨 Stock sheet — one landscape page (PDF)</button>
      </div>`;
    return;
  }
  const grandC=items.reduce((n,[,it])=>n+totalStock(it),0);
  const rows=items.map(([id,it])=>{
    const sizes=Object.keys(it.sizes||{}).sort(sizeSort);
    const tot=sizes.reduce((n,s)=>n+(it.sizes[s].stock||0),0);
    return `<div class="card"><b>${colorDot(it)}${esc(it.name)}</b>
      <span class="muted" style="float:right">${tot} total</span>
      <div class="sizerow" style="margin-top:8px">${sizes.map(s=>{
        const z=it.sizes[s]; const st=z.stock||0;
        return `<span class="sizebtn ${st===0?'out':st<=(z.reorder??2)?'low':''}" style="cursor:default">${esc(s)}<small>${st}</small></span>`;}).join('')}
      </div></div>`;
  }).join('');
  $('stockList').innerHTML=toggle+(rows? rows+`<div class="card"><b>TOTAL — ${grandC} pieces</b></div>` :'<div class="empty">Nothing matches.</div>');
}

async function voidSale(id){
  if(!confirm('Void this sale and put the items back in stock?')) return;
  const s=S.sales[id];
  for(const l of s.lines){ if(!l.adhoc && S.items[l.itemId]) await DB.txnStock(l.itemId,l.size,l.qty); }
  await DB.set(['sales',id,'voided'],true);
  toast('Sale voided — stock restored');
}

let finYear=new Date().getFullYear(), _finInit=false;
function finCalc(y){
  const F=S.finance, op=F.opening;
  if(y<op.year){ const h=(F.history||{})[String(y)];
    return h? {hist:true, income:h.income, expenses:h.expenses, balance:h.balance, note:h.note||''} : null; }
  const prev = y===op.year ? op.amount : (finCalc(y-1)||{}).balance||0;
  const salesAuto=Object.values(S.sales||{}).filter(s=>!s.voided&&new Date(s.ts).getFullYear()===y)
    .reduce((a,s)=>a+s.total,0);
  const tx=Object.entries(F.txns||{}).map(([id,t])=>({id,...t}))
    .filter(t=>new Date(t.ts).getFullYear()===y).sort((a,b)=>b.ts-a.ts);
  const incCash=tx.filter(t=>t.kind==='income'&&!t.inkind).reduce((a,t)=>a+t.amount,0);
  const inkind=tx.filter(t=>t.kind==='income'&&t.inkind).reduce((a,t)=>a+t.amount,0);
  const expenses=tx.filter(t=>t.kind==='expense').reduce((a,t)=>a+t.amount,0);
  const totalIn=prev+salesAuto+incCash;
  return {prev, salesAuto, incCash, inkind, expenses, tx,
    totalIn, balance:Math.round((totalIn-expenses)*100)/100,
    pctSpent: totalIn>0? expenses/totalIn : 0};
}
function booksHTML(){
  if(!S.finance){
    if(!_finInit){ _finInit=true; DB.set(['finance'],FIN_SEED).then(()=>rerender()); }
    return '<div class="empty">Opening the club books for the first time…</div>';
  }
  const F=S.finance, nowY=new Date().getFullYear();
  const years=[...new Set(Object.keys(F.history||{}).map(Number)
    .concat(Array.from({length:nowY-F.opening.year+1},(_,i)=>F.opening.year+i)))].sort();
  if(!years.includes(finYear)) finYear=nowY;
  const c=finCalc(finYear);
  const yearBtns=`<div class="payrow noprint" style="flex-wrap:wrap">
    ${years.map(y=>`<button class="${finYear===y?'on':''}" style="flex:1 1 15%"
      onclick="finYear=${y};rerender()">${y}</button>`).join('')}</div>`;
  if(c && c.hist){
    return printHead('Club Books — '+finYear,'Archived year') + yearBtns + `
      <div class="statgrid">
        <div class="stat green"><div class="v">${fmt(c.income)}</div><div class="l">Total income (incl. carry-over)</div></div>
        <div class="stat red"><div class="v">${fmt(c.expenses)}</div><div class="l">Expenses</div></div>
        <div class="stat gold"><div class="v">${fmt(c.balance)}</div><div class="l">Year-end balance</div></div>
        <div class="stat"><div class="v">${Math.round(c.expenses/c.income*100)}%</div><div class="l">Of income spent</div></div>
      </div>
      ${c.note?'<p class="muted">Note: '+esc(c.note)+' — the original sheet had a broken formula for this year; figures are derived from the years around it.</p>':''}
      <p class="muted">Archived summary from the old Excel sheet. Full detail for this year stays in the workbook.</p>
      ${yoyHTML(years)}`;
  }
  const catSum=(kind,cat)=>c.tx.filter(t=>t.kind===kind&&t.cat===cat&&!t.inkind).reduce((a,t)=>a+t.amount,0);
  // like the Budget Report: EVERY category shown, even at $0
  const hidCats=F.catsHidden||{income:[],expense:[]};
  const incCats=[...new Set((F.cats&&F.cats.income||FIN_SEED.cats.income)
    .filter(x=>!(hidCats.income||[]).includes(x))
    .concat(c.tx.filter(t=>t.kind==='income').map(t=>t.cat)))];
  const expCats=[...new Set((F.cats&&F.cats.expense||FIN_SEED.cats.expense)
    .filter(x=>!(hidCats.expense||[]).includes(x))
    .concat(c.tx.filter(t=>t.kind==='expense').map(t=>t.cat)))];
  // sponsor quota board — driven by the member ROSTER (plus anyone credited)
  const target=F.sponsorTarget||500;
  const secured={};
  c.tx.filter(t=>t.kind==='income'&&t.cat==='Donations'&&t.member).forEach(t=>{
    secured[t.member]=(secured[t.member]||0)+t.amount; });
  const roster=(S.attendance&&S.attendance.roster||ATT_SEED.roster).filter(r=>!r.hidden).map(r=>r.name);
  const boardNames=[...new Set(roster.concat(Object.keys(secured)))];
  // entries grouped by category, subtotal per group
  const groups={};
  c.tx.forEach(t=>{ (groups[t.cat]=groups[t.cat]||[]).push(t); });
  const entriesHTML=Object.entries(groups).map(([cat,list])=>{
    const sub=list.reduce((a,t)=>a+(t.inkind?0:t.amount),0);
    const subInk=list.reduce((a,t)=>a+(t.inkind?t.amount:0),0);
    const kind=list[0].kind;
    return `<div class="card" style="padding:10px 14px;background:var(--panel2)">
      <b>${esc(cat)}</b><span style="float:right"><span class="${kind==='income'?'pos':'neg'}"><b>${kind==='income'?'+':'−'}${fmt(sub)}</b></span>${subInk>0?` <span class="muted">+ ${fmt(subInk)} in-kind</span>`:''}</span></div>`+
      list.map(t=>`<div class="card" style="display:flex;justify-content:space-between;gap:10px;align-items:center">
        <div>${t.inkind?`<b class="goldtxt">🎁 ${fmt(t.amount)} value</b> <span class="memberflag">IN-KIND — not income</span>`:`<b class="${t.kind==='income'?'pos':'neg'}">${t.kind==='income'?'+':'−'}${fmt(t.amount)}</b>`}
          <span class="muted">${new Date(t.ts).toLocaleDateString('en-CA')}</span>
          ${t.sponsor?' · <b>'+esc(t.sponsor)+'</b>':''}
          <div class="muted">${t.member?(t.kind==='income'?'secured by ':'reimbursed to ')+esc(t.member):''}${t.member&&t.note?' · ':''}${t.note?esc(t.note):''}</div></div>
        <span style="flex:0 0 auto" class="noprint">${t.invoice?`<button class="btn small gray" onclick="viewInvoice('${t.id}')">📎</button>`:''}
        <button class="btn small gray" onclick="finEntryModal('${t.id}')">✎</button></span>
      </div>`).join('');
  }).join('');
  return printHead('Club Books — '+finYear, 'Cash flow & annual report') + yearBtns + `
    ${!F.imported2026 && finYear===2026 ? `<div class="card" style="border-color:var(--gold)">
      <b>📥 One-time import available</b>
      <p class="muted">I parsed every 2026 cell note from your Excel sheet — 8 donations ($4,000, with who secured each) and 10 expenses ($3,757.62, itemized). Load them as real entries?</p>
      <button class="btn" onclick="importFin2026()">Import the 2026 entries from the Excel notes</button></div>`:''}
    <div class="rowbtns noprint">
      <button class="btn" onclick="finEntryModal(null)">＋ Add income / expense entry</button>
      <button class="btn gray" style="flex:0 0 auto" onclick="manageCatsModal()">⚙ Categories</button>
    </div>
    <div style="height:12px"></div>
    <h2>Total income</h2>
    <div class="card"><table>
      <tr><th>Item</th><th class="r">Amount</th></tr>
      ${incCats.map(cat=>`<tr><td>${esc(cat)}</td><td class="r">${fmt(catSum('income',cat))}</td></tr>`).join('')}
      <tr><td>Picnic + Apparel Sales — 🛒 live from this app</td><td class="r pos">${fmt(c.salesAuto)}</td></tr>
      <tr><td>Previous Balance (carried from ${finYear-1})</td><td class="r">${fmt(c.prev)}</td></tr>
      <tr><td><b>TOTAL INCOME</b></td><td class="r"><b>${fmt(c.totalIn)}</b></td></tr>
      ${c.inkind>0.005?`<tr><td class="muted">In-kind donations (tracked, not in balance)</td><td class="r muted">${fmt(c.inkind)}</td></tr>`:''}
    </table></div>
    <h2>Total expenses</h2>
    <div class="card"><table>
      <tr><th>Item</th><th class="r">Amount</th></tr>
      ${expCats.map(cat=>`<tr><td>${esc(cat)}</td><td class="r ${catSum('expense',cat)>0?'':'dim'}">${fmt(catSum('expense',cat))}</td></tr>`).join('')}
      <tr><td><b>TOTAL EXPENSES</b></td><td class="r"><b>${fmt(c.expenses)}</b></td></tr>
    </table></div>
    <h2>Summary</h2>
    <div class="statgrid">
      <div class="stat green"><div class="v">${fmt(c.totalIn)}</div><div class="l">Total annual income</div></div>
      <div class="stat red"><div class="v">${fmt(c.expenses)}</div><div class="l">Total annual expenses</div></div>
      <div class="stat gold"><div class="v">${fmt(c.balance)}</div><div class="l">Balance</div></div>
      <div class="stat"><div class="v">${Math.round(c.pctSpent*100)}%</div><div class="l">Percentage of income spent</div></div>
    </div>
    <h2>Sponsor rule — every member secures a ${fmt(target)} sponsor, or self-sponsors</h2>
    <div class="card"><table><tr><th>Member</th><th class="r">Secured this year</th><th class="r">Status</th></tr>
      ${boardNames.map(m=>{ const got=secured[m]||0;
        return `<tr><td>${esc(m)}</td><td class="r">${fmt(got)}</td>
          <td class="r ${got>=target?'pos':'neg'}"><b>${got>=target?'✔ covered':'owes '+fmt(target-got)}</b></td></tr>`;}).join('')}
    </table></div>
    <p class="muted">A donation counts toward whoever is picked as "secured by". Self-sponsoring: record a donation with sponsor "(Self)" and pick the member.</p>
    <h2>Entries — ${finYear} (grouped by category)</h2>
    ${entriesHTML||'<div class="empty">No entries yet for '+finYear+'. Sales income flows in automatically; add donations and expenses with the button above.</div>'}
    ${yoyHTML(years)}
    <div class="rowbtns noprint">
      <button class="btn gray" onclick="window.print()">🖨 Print / Save as PDF</button>
      <button class="btn gray" onclick="exportBooksCSV()">⬇ Books CSV</button>
    </div>`;
}
async function importFin2026(){
  for(const [id,t] of Object.entries(FIN_TXNS_2026)){
    await DB.set(['finance','txns',id], t);
  }
  await DB.set(['finance','imported2026'], true);
  toast('2026 entries imported from the Excel notes'); rerender();
}
function yoyHTML(years){
  return `<h2>Year over year</h2><div class="card"><table>
    <tr><th>Year</th><th class="r">Total income*</th><th class="r">Expenses</th><th class="r">Balance</th></tr>
    ${years.map(y=>{ const c=finCalc(y); if(!c) return '';
      return `<tr ${y===finYear?'style="font-weight:700"':''}><td>${y}${c.hist&&c.note?' †':''}</td>
        <td class="r">${fmt(c.hist?c.income:c.totalIn)}</td><td class="r">${fmt(c.expenses)}</td>
        <td class="r ${y===finYear?'goldtxt':''}">${fmt(c.balance)}</td></tr>`;}).join('')}
    </table></div>
    <p class="muted">* includes the balance carried forward, same as the old sheet. † reconstructed year.</p>`;
}

function feKind(k){
  window._fe.kind=k;
  $('feInc').classList.toggle('on',k==='income');
  $('feExp').classList.toggle('on',k!=='income');
  $('feIncOnly').style.display=k==='income'?'block':'none';
  $('fe_memLab').textContent=k==='income'?'Secured / collected by (counts toward their sponsor quota)':'Paid to / reimbursed to (optional)';
  // reload category options for the kind
  const hidK=((S.finance.catsHidden||{})[k==='income'?'income':'expense'])||[];
  const cats=((S.finance.cats||FIN_SEED.cats)[k==='income'?'income':'expense']||[]).filter(x=>!hidK.includes(x));
  const sel=$('fe_cat');
  if(sel && sel.tagName==='SELECT'){
    sel.innerHTML='<option value="" selected disabled>Pick a category…</option>'
      +cats.map(x=>`<option>${esc(x)}</option>`).join('')+'<option value="__new">＋ New category…</option>';
  }
}
function feInkind(ink){
  $('feCash').classList.toggle('on',!ink);
  $('fe_inkind').classList.toggle('on',ink);
  $('feInkNote').style.display=ink?'block':'none';

async function catAdd(kind){

}
async function catMove(kind,i,dir){
  const cats=[...S.finance.cats[kind]]; const j=i+dir;
  if(j<0||j>=cats.length) return;
  [cats[i],cats[j]]=[cats[j],cats[i]];
  await DB.set(['finance','cats',kind],cats);
  manageCatsModal();
}
async function catHide(kind,i,hide){
  const cat=S.finance.cats[kind][i];
  let list=[...(((S.finance.catsHidden||{})[kind])||[])];
  if(hide==='true'||hide===true){ if(!list.includes(cat)) list.push(cat); }
  else list=list.filter(x=>x!==cat);
  await DB.set(['finance','catsHidden',kind],list);
  manageCatsModal();
}
async function catDelete(kind,i){
  const cat=S.finance.cats[kind][i];
  if(Object.values(S.finance.txns||{}).some(t=>t.cat===cat)){
    toast('"'+cat+'" has entries — hide it instead',1); return; }
  if(!confirm('Delete category "'+cat+'"? (It was never used.)')) return;
  await DB.set(['finance','cats',kind],S.finance.cats[kind].filter((x,j)=>j!==i));
  await DB.set(['finance','catsHidden',kind],(((S.finance.catsHidden||{})[kind])||[]).filter(x=>x!==cat));

async function catRenameSave(kind,i){
  const old=S.finance.cats[kind][i], nv=$('mcEdit').value.trim();
  if(!nv){ toast('Name required',1); return; }
  const cats=[...S.finance.cats[kind]]; cats[i]=nv;

function feInvoicePick(inp){
  const f=inp.files&&inp.files[0]; if(!f) return;
  if(!(f.type||'').startsWith('image/')){
    // PDF / Word / any document — stored as-is (no compression possible)
    if(f.size>4*1024*1024){ toast('File too big — keep it under 4 MB, or take a photo of it instead',1); inp.value=''; return; }
    const rd=new FileReader();
    rd.onload=()=>{
      window._feInvNew={name:f.name||'invoice', type:f.type||'application/octet-stream', data:rd.result};
      const pv=$('feInvPrev'); if(pv) pv.style.display='none';
      const nm=$('feInvName'); if(nm){ nm.textContent='📄 '+f.name+' — attached'; nm.style.display='block'; }
      toast('Invoice file attached');
    };
    rd.readAsDataURL(f); inp.value=''; return;
  }
  const rd=new FileReader();
  rd.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      let mx=1200,q=0.8,data='';
      for(let k=0;k<3;k++){
        const sc=Math.min(1,mx/Math.max(img.width,img.height));
        const cv=document.createElement('canvas');
        cv.width=Math.max(1,Math.round(img.width*sc)); cv.height=Math.max(1,Math.round(img.height*sc));
        cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
        data=cv.toDataURL('image/jpeg',q);
        if(data.length<450000) break;
        mx*=0.7; q=0.7;
      }
      window._feInvNew={name:f.name||'photo.jpg', type:'image/jpeg', data};
      const nm=$('feInvName'); if(nm) nm.style.display='none';
      const pv=$('feInvPrev'); if(pv){ pv.src=data; pv.style.display='block'; }
      toast('Invoice photo attached');
    };
    img.src=rd.result;
  };
  rd.readAsDataURL(f); inp.value='';
}
async function viewInvoice(id){
  const tx=S.finance.txns[id];
  if(!tx||!tx.invoice) return;
  const head=`<h3><button class="x" onclick="closeModal()">✕</button>📎 ${esc(tx.cat)} — ${fmt(tx.amount)} · ${new Date(tx.ts).toLocaleDateString('en-CA')}</h3>`;
  const note=tx.note?'<p class="muted">'+esc(tx.note)+'</p>':'';
  if(String(tx.invoice).startsWith('data:')){   // older photo entries — stored inline
    openModal(head+`<img src="${tx.invoice}" style="width:100%;border-radius:10px">`+note); return;
  }
  openModal(head+'<div class="empty">Loading the attachment…</div>');
  const fobj=await fileLoad(String(tx.invoice).slice(5));
  if(!fobj||!fobj.data){ openModal(head+'<div class="empty">Could not load the attachment — check the connection and try again.</div>'+note); return; }
  const dl=`<a class="btn gray" style="display:block;text-align:center;text-decoration:none;margin-top:8px" href="${fobj.data}" download="${esc(fobj.name||'invoice')}">⬇ Download ${esc(fobj.name||'file')}</a>`;
  if((fobj.type||'').startsWith('image/'))
    openModal(head+`<img src="${fobj.data}" style="width:100%;border-radius:10px">`+note+dl);
  else if(fobj.type==='application/pdf')
    openModal(head+`<embed src="${fobj.data}" type="application/pdf" style="width:100%;height:60vh;border-radius:10px"><p class="muted noprint">If the preview is blank on this phone, use Download below.</p>`+note+dl);
  else
    openModal(head+`<div class="card">📄 <b>${esc(fobj.name||'document')}</b><br><span class="muted">Word / document file — download it to open.</span></div>`+note+dl);
}

function esSetPay(p){
  _es.payment=p;
  $('esPayCash').classList.toggle('on',p==='Cash');
  $('esPayLater').classList.toggle('on',p==='Pay Later');
  $('esBuyerWrap').style.display = p==='Pay Later'?'block':'none';
}
async function saveSaleEdit(){
  const s=S.sales[_es.id];
  if(_es.payment==='Pay Later'){
    _es.buyer=$('es_buyer').value;
    if(!_es.buyer){ toast('Pick which member owes this',1); return; }
  }
  const rows=[...document.querySelectorAll('#modalBox .sizeedit')];
  const newLines=[], applied=[];
  for(const r of rows){
    const i=+r.dataset.i, l=s.lines[i];
    const q=Math.max(0,Math.round(+r.querySelector('.es_q').value||0));
    const p=Math.max(0,+r.querySelector('.es_p').value||0);
    const delta=q-l.qty;                      // extra units sold consume stock
    if(delta!==0 && !l.adhoc && S.items[l.itemId]){
      const ok=await DB.txnStock(l.itemId,l.size,-delta);
      if(!ok){
        for(const a of applied) await DB.txnStock(a.itemId,a.size,a.d);   // roll back
        toast('Not enough stock for '+l.item+' '+l.size,1); return;
      }
      applied.push({itemId:l.itemId,size:l.size,d:delta});
    }
    if(q>0) newLines.push({...l,qty:q,price:p});
  }
  const total=newLines.reduce((a,l)=>a+l.qty*l.price,0);
  await DB.set(['sales',_es.id],{...s, lines:newLines, total,
    payment:_es.payment, buyer:_es.payment==='Pay Later'?_es.buyer:null,
    voided:newLines.length===0? true : (s.voided||false),
    edited:{ts:Date.now(), by:meU().name}});
  closeModal();
  toast(newLines.length? 'Sale updated — '+fmt(total) : 'All lines removed — sale voided');
  rerender();
}

/* One-page LANDSCAPE stock sheet: every item, every size, totals — sized to
   fit inside the margins of a single printed page (or Save-as-PDF).         */
function printStockSheet(){
  const items=allItemsSorted().filter(([,i])=>!i.adhoc);
  const sizes=[...new Set(items.flatMap(([,it])=>Object.keys(it.sizes||{})))].sort(sizeSort);
  const colTot=sizes.map(sz=>items.reduce((n,[,it])=>n+((((it.sizes||{})[sz])||{}).stock||0),0));
  const grand=colTot.reduce((a,b)=>a+b,0);
  // shrink the type as the table grows so it always stays on ONE page
  const fs=items.length>30?7:items.length>24?8:9;
  const rows=items.map(([id,it])=>
    `<tr><td class="nm">${esc(it.name)}${it.active===false?' <span style="font-weight:400">(hidden)</span>':''}</td>${sizes.map(sz=>{
      const z=(it.sizes||{})[sz];
      if(!z) return '<td class="na"></td>';
      const st=z.stock||0;
      return `<td${st===0?' class="zero"':''}>${st===0?'—':st}</td>`;
    }).join('')}<td class="tt">${totalStock(it)}</td></tr>`).join('');
  const old=$('printSheet'); if(old) old.remove();
  const el=document.createElement('div'); el.id='printSheet';
  el.innerHTML=`<style>
    #printSheet{display:none}
    @media print{
      @page{size:A4 landscape;margin:8mm}
      body.sheetmode>*:not(#printSheet){display:none !important}
      body.sheetmode #printSheet{display:block !important;color:#000;background:#fff;font-family:Arial,sans-serif}
    }
    #printSheet h1{font-size:15px;margin:0 0 1px;letter-spacing:1px}
    #printSheet .sub{font-size:9px;margin:0 0 5px;color:#333}
    #printSheet table{border-collapse:collapse;width:100%;font-size:${fs}px;line-height:1.35;table-layout:auto}
    #printSheet th,#printSheet td{border:1px solid #888;padding:1px 3px;text-align:center}
    #printSheet th{background:#e8e2d2;font-size:${fs}px}
    #printSheet td.nm{text-align:left;font-weight:700;white-space:nowrap}
    #printSheet td.na{background:#f2f2f2}
    #printSheet td.zero{color:#999}
    #printSheet .tt,#printSheet tr.tot td{font-weight:700;background:#eee}
  </style>
  <h1>★ THREE ACES ★ — STOCK SHEET</h1>
  <div class="sub">Italian Canadian Cultural Club · every item and size · ${grand} pieces total ·
    printed ${new Date().toLocaleString('en-CA')} · — = sold out, grey = size not carried</div>
  <table>
    <tr><th style="text-align:left">Item</th>${sizes.map(s=>`<th>${esc(s)}</th>`).join('')}<th>Total</th></tr>
    ${rows}
    <tr class="tot"><td class="nm">TOTAL</td>${colTot.map(n=>`<td>${n}</td>`).join('')}<td>${grand}</td></tr>
  </table>`;
  document.body.appendChild(el);
  document.body.classList.add('sheetmode');
  const clean=()=>{ document.body.classList.remove('sheetmode'); el.remove(); window.removeEventListener('afterprint',clean); };
  window.addEventListener('afterprint',clean);
  window.print();
  setTimeout(clean,4000);   // fallback if the browser never fires afterprint
}

      const r=l.price*l.qty, c=l.cost*l.qty;

    e.n++; e.units+=sUnits; e.rev+=sRev; e.prof+=sProf; e.toSeller+=sProf*pct;
  });
  const profit=rev-cogs;
  const toSellers=Object.values(bySeller).reduce((a,e)=>a+e.toSeller,0);
  const sellerNames=[...new Set(salesSorted().map(([,s])=>s.sellerName)
    .concat(Object.values(S.users||{}).map(u=>u.name)))].sort((a,b)=>a.localeCompare(b));

    .concat(allItemsSorted().map(([,i])=>i.name)))].sort((a,b)=>a.localeCompare(b));
  const presets=[['today','Today'],['week','This week'],['month','This month'],['year','This year'],['all','All time']];
  const filterSub=(repSeller?'seller: '+repSeller+' · ':'')+(repItem?'item: '+repItem+' · ':'')+(repDisc==='only'?'discounted sales only · ':'');
  return printHead('Sales Report', filterSub + dstr(from)+' to '+dstr(to)) + `
   <div class="payrow noprint" style="flex-wrap:wrap">
     ${presets.map(([v,l])=>`<button class="${repPreset===v?'on':''}" style="flex:1 1 28%"
       onclick="repPreset='${v}';rerender()">${l}</button>`).join('')}

let invExcl={}, invExclSz={};

function invCatToggle(cat){

  return [...s].sort(sizeSort);

   </div>
   <h2>By size — where the money is sitting</h2>
   <div class="card"><table>
     <tr><th>Size</th><th class="r">Units</th><th class="r">At cost</th><th class="r">Potential revenue</th><th class="r">Potential profit</th></tr>
     ${szRows.map(([sz,b])=>`<tr><td><b>${esc(sz)}</b></td><td class="r">${b.u}</td>
       <td class="r">${fmt(b.c)}</td><td class="r">${fmt(b.r)}</td><td class="r ${b.r-b.c>=0?'pos':'neg'}">${fmt(b.r-b.c)}</td></tr>`).join('')
       ||'<tr><td colspan="5" class="empty">Nothing counted — pick at least one item above.</td></tr>'}
     ${szRows.length?`<tr class="totrow"><td>TOTAL</td><td class="r">${tu}</td><td class="r">${fmt(tc)}</td><td class="r">${fmt(tr)}</td><td class="r">${fmt(tr-tc)}</td></tr>`:''}
   </table></div>
   <h2>By item</h2>
   <div class="card"><table>
     <tr><th>Item</th><th class="r">Units</th><th class="r">At cost</th><th class="r">Potential revenue</th><th class="r">Potential profit</th></tr>

       ||'<tr><td colspan="5" class="empty">Nothing counted — pick at least one item above.</td></tr>'}
   </table></div>
   <p class="muted">Current stock only — sold pieces are in the sales report above. Potential revenue uses today's selling prices

function moneyHTML(){
  // All-time settlement view.
  //  - Cash/E-Transfer sales: the SELLER is holding the money → seller owes club (minus their profit share).
  //  - Pay Later sales: nobody collected money → the BUYER owes the club (their "tab").
  const sales=salesSorted().map(([,s])=>s).filter(s=>!s.voided);
  const cashSales=sales.filter(s=>s.payment!=='Pay Later');
  const tabSales=sales.filter(s=>s.payment==='Pay Later');
  const bal={};  const row=n=>bal[n]=bal[n]||{collected:0,keeps:0,received:0};
  cashSales.forEach(s=>{
    const pct=(s.sellerPct||0)/100;
    const prof=s.lines.reduce((a,l)=>a+(l.price-l.cost)*l.qty,0);
    const e=row(s.sellerName); e.collected+=s.total; e.keeps+=prof*pct;
  });
  const tabs={};  const trow=n=>tabs[n]=tabs[n]||{charged:0,paid:0};
  tabSales.forEach(s=>{ trow(s.buyer||'Unknown').charged+=s.total; });
  const pays=Object.entries(S.payments||{}).sort((a,b)=>b[1].ts-a[1].ts);
  const payoutBy={};   // club -> member profit-share payouts
  const floats={};     // cash float: loaned out for making change, then returned
  const frow=n=>floats[n]=floats[n]||{out:0,back:0};
  pays.forEach(([,p])=>{
    if(p.kind==='tab') trow(p.from).paid+=p.amount;
    else if(p.kind==='payout') payoutBy[p.from]=(payoutBy[p.from]||0)+p.amount;
    else if(p.kind==='floatout') frow(p.from).out+=p.amount;
    else if(p.kind==='floatin') frow(p.from).back+=p.amount;
    else row(p.from).received+=p.amount;
  });
  const floatOutNow=Object.values(floats).reduce((a,f)=>a+(f.out-f.back),0);
  // profit share the club owes sellers on Pay-Later sales (club collects those in full)
  const shareOf=s=>{ const prof=s.lines.reduce((a,l)=>a+(l.price-l.cost)*l.qty,0);
    return prof*(s.sellerPct||0)/100; };
  const laterShare={};
  tabSales.forEach(s=>{ const sh=shareOf(s); if(sh>0) laterShare[s.sellerName]=(laterShare[s.sellerName]||0)+sh; });
  Object.keys(payoutBy).forEach(n=>{ laterShare[n]=laterShare[n]||0; });
  const owedSellers=Object.values(bal).reduce((a,e)=>a+(e.collected-e.keeps),0);
  const recSellers=Object.values(bal).reduce((a,e)=>a+e.received,0);
  const owedTabs=Object.values(tabs).reduce((a,e)=>a+e.charged,0);
  const paidTabs=Object.values(tabs).reduce((a,e)=>a+e.paid,0);
  const outstanding=(owedSellers-recSellers)+(owedTabs-paidTabs);
  return printHead('Money In / Reimbursements & Tabs','All-time up to '+new Date().toLocaleDateString('en-CA')) + `
   <p class="muted noprint">Cash &amp; e-transfer sales: whoever rang it up is holding that money and owes the club everything
   they collected minus the profit share they keep. Pay-later sales go on the buyer's tab instead. When any money is
   handed to the club, record it below — with the date it was actually paid.</p>
   <button class="btn noprint" onclick="recordPayment()">＋ Record money received by club</button>
   <div style="height:12px"></div>
   <div class="statgrid">
     <div class="stat gold"><div class="v">${fmt(owedSellers)}</div><div class="l">Owed by sellers (cash sales)</div></div>
     <div class="stat gold"><div class="v">${fmt(owedTabs-paidTabs)}</div><div class="l">Owed on member tabs</div></div>
     <div class="stat green"><div class="v">${fmt(recSellers+paidTabs)}</div><div class="l">Received by club</div></div>
     <div class="stat ${outstanding>0.005?'red':'green'}"><div class="v">${fmt(outstanding)}</div><div class="l">Still outstanding (total)</div></div>
     ${floatOutNow>0.005?`<div class="stat gold"><div class="v">${fmt(floatOutNow)}</div><div class="l">💵 Cash float currently out</div></div>`:''}
   </div>
   ${Object.keys(floats).length?`<h2>Cash float (change money — not revenue)</h2>
   <div class="card"><table>
    <tr><th>Held by</th><th class="r">Given out</th><th class="r">Returned</th><th class="r">Still out</th></tr>
    ${Object.entries(floats).map(([n,f])=>{
      const o=f.out-f.back;
      return `<tr><td>${esc(n)}</td><td class="r">${fmt(f.out)}</td><td class="r pos">${fmt(f.back)}</td>
        <td class="r ${o>0.005?'goldtxt':'pos'}"><b>${fmt(o)}</b></td></tr>`;}).join('')}
   </table></div>
   <p class="muted">End-of-day counting: <b>cash box total − float still out = sales cash</b> to hand in.
   The float is a loan for making change — it never counts as revenue or as money owed. When the box comes back,
   record a "Float returned" below and the balance goes to $0.</p>`:''}
   <h2>Sellers — cash to hand in</h2>
   <div class="card"><table>
    <tr><th>Member</th><th class="r">Collected</th><th class="r">Keeps</th><th class="r">Owes club</th><th class="r">Paid in</th><th class="r">Balance</th></tr>
    ${Object.entries(bal).map(([n,e])=>{
      const owes=e.collected-e.keeps, b=owes-e.received;
      return `<tr><td>${esc(n)}</td><td class="r">${fmt(e.collected)}</td><td class="r goldtxt">${fmt(e.keeps)}</td>
        <td class="r">${fmt(owes)}</td><td class="r pos">${fmt(e.received)}</td>
        <td class="r ${b>0.005?'neg':'pos'}"><b>${fmt(b)}</b></td></tr>`;}).join('')
      ||'<tr><td colspan="6" class="empty">No cash sales or hand-ins yet.</td></tr>'}
   </table></div>
   <h2>Member tabs — pay later</h2>
   <div class="card"><table>
    <tr><th>Member</th><th class="r">Charged</th><th class="r">Paid</th><th class="r">Still owes</th></tr>
    ${Object.entries(tabs).map(([n,e])=>{
      const b=e.charged-e.paid;
      return `<tr><td>${esc(n)}</td><td class="r">${fmt(e.charged)}</td><td class="r pos">${fmt(e.paid)}</td>
        <td class="r ${b>0.005?'neg':'pos'}"><b>${fmt(b)}</b></td></tr>`;}).join('')
      ||'<tr><td colspan="4" class="empty">No pay-later purchases yet.</td></tr>'}
   </table></div>
   ${Object.keys(laterShare).length?`<h2>Profit share owed BY the club (pay-later sales)</h2>
   <div class="card"><table>
    <tr><th>Member</th><th class="r">Share earned</th><th class="r">Paid out</th><th class="r">Club still owes</th></tr>
    ${Object.entries(laterShare).map(([n,sh])=>{
      const po=payoutBy[n]||0, o=sh-po;
      return `<tr><td>${esc(n)}</td><td class="r goldtxt">${fmt(sh)}</td><td class="r pos">${fmt(po)}</td>
        <td class="r ${o>0.005?'neg':'pos'}"><b>${fmt(o)}</b></td></tr>`;}).join('')}
   </table></div>
   <p class="muted">On a pay-later sale the club collects the full amount from the buyer, so the seller's profit share
   is owed back to them — record it below as a payout when it's paid.</p>`:''}
   <p class="muted">Sellers' balance = collected − keeps − handed in. Tabs = pay-later purchases − tab payments. $0 means settled up.</p>
   <h2>Payments received</h2>
   ${pays.map(([id,p])=>`<div class="card" style="display:flex;justify-content:space-between;align-items:center;gap:10px">
      <div><b>${fmt(p.amount)}</b> ${(p.kind==='payout'||p.kind==='floatout')?'to':'from'} ${esc(p.from)}
        <span class="memberflag">${p.kind==='tab'?'TAB PAYMENT':p.kind==='payout'?'PROFIT PAYOUT':p.kind==='floatout'?'FLOAT OUT':p.kind==='floatin'?'FLOAT RETURNED':'SALES CASH'}</span>
        <div class="muted">${new Date(p.ts).toLocaleDateString('en-CA')}${p.note?' · '+esc(p.note):''} · recorded by ${esc(p.by)}</div></div>
      <button class="btn small red noprint" onclick="delPayment('${id}')">✕</button>
    </div>`).join('')||'<div class="empty">No payments recorded yet.</div>'}
   <button class="btn gray noprint" style="margin-top:8px" onclick="window.print()">🖨 Print / Save as PDF</button>`;
}
function recordPayment(){
  const names=[...new Set([
    ...Object.values(S.users||{}).map(u=>u.name),
    ...salesSorted().map(([,s])=>s.sellerName),
    ...salesSorted().map(([,s])=>s.buyer).filter(Boolean)])];
  const today=dstr(Date.now());
  openModal(`<h3><button class="x" onclick="closeModal()">✕</button>Record money received by club</h3>
    <label>What is this payment?</label><select id="mp_kind">
      <option value="handover">Sales cash being handed in (seller → club)</option>
      <option value="tab">A member paying their tab (pay-later purchase → club)</option>
      <option value="payout">Club paying a member their profit share (club → member)</option>
      <option value="floatout">💵 Cash float GIVEN OUT for making change (club → cash box)</option>
      <option value="floatin">💵 Cash float RETURNED at end of day (cash box → club)</option></select>
    <label>Member</label><select id="mp_from">${names.map(n=>`<option>${esc(n)}</option>`).join('')}
      <option>Other</option></select>
    <label>Amount received $</label><input id="mp_amt" type="number" min="0" step="0.01" placeholder="0.00">
    <label>Date they paid (can be a past date)</label><input id="mp_date" type="date" value="${today}">
    <label>Note (optional — e.g. "e-transfer" or "cash at meeting")</label><input id="mp_note">
    <div style="height:10px"></div>
    <button class="btn" onclick="savePayment()">✓ Record Payment</button>`);
}
async function savePayment(){
  const amt=+$('mp_amt').value||0;
  if(amt<=0){ toast('Enter an amount',1); return; }
  const d=$('mp_date').value;
  const ts=d? new Date(d+'T12:00').getTime() : Date.now();
  await DB.push(['payments'],{ts, kind:$('mp_kind').value, from:$('mp_from').value,
    amount:Math.round(amt*100)/100, note:$('mp_note').value.trim(), by:meU().name});
  closeModal(); toast('Payment recorded'); rerender();
}
async function delPayment(id){
  const p=S.payments[id];
  if(!confirm('Delete this payment ('+fmt(p.amount)+' from '+p.from+')?')) return;
  await DB.set(['payments',id],null); toast('Payment deleted'); rerender();
}
function reorderHTML(){

function rsPreview(el,id){
  const row=el.closest('.rsrow'); const s=row.dataset.size; const z=S.items[id].sizes[s];
  const q=+row.querySelector('.rs_q').value||0, c=+row.querySelector('.rs_c').value||0;
  const st=z.stock||0;
  const avg=q>0 ? ((st*z.cost)+(q*c))/(st+q) : z.cost;
  row.querySelector('.rs_avg').textContent=fmt(Math.round(avg*100)/100);
}
async function saveRestock(id){
  const it=S.items[id]; let any=false;
  for(const row of document.querySelectorAll('#modalBox .rsrow')){
    const s=row.dataset.size;
    const q=Math.round(+row.querySelector('.rs_q').value||0);
    const c=+row.querySelector('.rs_c').value||0;
    if(q<=0) continue;
    any=true;
    const z=it.sizes[s]; const st=z.stock||0;
    const avg=Math.round((((st*z.cost)+(q*c))/(st+q))*100)/100;
    await DB.set(['items',id,'sizes',s,'cost'],avg);
    await DB.txnStock(id,s,q);
    await DB.push(['restocks'],{ts:Date.now(),itemId:id,item:it.name,size:s,qty:q,unitCost:c,newAvgCost:avg,by:meU().name});
  }
  if(!any){ toast('Enter a quantity for at least one size',1); return; }
  closeModal(); toast('Stock received — costs updated'); rerender();
}

function sizeRowHTML(s,z,def){

  // Standard sizes get a dropdown; unusual labels (e.g. hat colours) get a text box via "Custom…"
  const std = !s || SIZE_ORDER.includes(s);

    ? `<select class="se_s" onchange="if(this.value==='__custom'){const i=document.createElement('input');i.className='se_s';i.placeholder='Size';this.replaceWith(i);i.focus();}">

        ${SIZE_ORDER.map(o=>`<option ${o===s?'selected':''}>${o}</option>`).join('')}
        <option value="__custom">Custom…</option></select>`
    : `<input class="se_s" value="${esc(s)}" placeholder="Size">`;
  return `<div class="sizeedit">${sizeField}

function addSizeRow(){
  // Default the new row to the NEXT size up, and copy cost/price from the row above
  const rows=[...document.querySelectorAll('#ei_sizes .sizeedit')];
  let next='', def=null;
  if(rows.length){
    const last=rows[rows.length-1];
    const lastSize=(last.querySelector('.se_s')||{}).value||'';
    const i=SIZE_ORDER.indexOf(lastSize);
    if(i>=0 && SIZE_ORDER[i+1] && SIZE_ORDER[i+1]!=='One Size') next=SIZE_ORDER[i+1];
    def={cost:last.querySelector('.se_c').value, price:last.querySelector('.se_p').value,
         reorder:last.querySelector('.se_r').value||2};
  }
  $('ei_sizes').insertAdjacentHTML('beforeend', sizeRowHTML(next,null,def));
}
async function saveItem(id){
  const name=$('ei_name').value.trim();
  let cat=$('ei_cat').value.trim();
  if(cat==='__new') cat='';
  cat=cat||'Other';
  if(!name){ toast('Name is required',1); return; }
  const sizes={};
  document.querySelectorAll('#ei_sizes .sizeedit').forEach(r=>{
    let s=r.querySelector('.se_s').value.trim().replace(/[.#$/\[\]]/g,'-'); // chars the database forbids in names
    if(!s || s==='__custom') return;
    sizes[s]={cost:+r.querySelector('.se_c').value||0, price:+r.querySelector('.se_p').value||0,
      stock:Math.max(0,Math.round(+r.querySelector('.se_q').value||0)),
      reorder:Math.max(0,Math.round(+r.querySelector('.se_r').value||0))};
  });
  if(!Object.keys(sizes).length){ toast('Add at least one size',1); return; }
  const color = $('ei_dot').checked ? $('ei_color').value : 'none';
  const adhoc = $('ei_adhoc').classList.contains('on');
  const salePct = Math.min(90, Math.max(0, Math.round(parseFloat(String($('ei_sale').value).replace(/[^0-9.]/g,''))||0)));
  if(id){ const it=S.items[id];
    await DB.set(['items',id],{...it,name,cat,sizes,color,adhoc,salePct});
  }else{
    const order=Math.max(0,...itemsSorted().map(([,i])=>i.order??0))+1;
    await DB.set(['items',newId()],{name,cat,sizes,color,adhoc,salePct,order,active:true});
  }
  closeModal(); toast('Item saved'); rerender();
}

async function downloadBackup(){
  let tree, files;
  if(CLOUD){
    toast('Building the backup — reading the whole database…');
    let r; try{ r=await fetch(_restUrl([]),{cache:'no-store'}); }catch(e){ r=null; }
    if(!r||!r.ok){ toast('Could not read the database — check the connection and try again',1); return; }
    tree=await r.json();
    try{
      const rf=await fetch(FIREBASE_CONFIG.databaseURL.replace(/\/+$/,'')+'/threeacesFiles.json',{cache:'no-store'});
      files=rf.ok? await rf.json() : null;
    }catch(e){ files=null; }
  }else{
    tree=S; files=JSON.parse(localStorage.getItem('threeacesFiles')||'null');
  }
  if(!tree||!tree.users){ toast('The database looks empty — backup not saved',1); return; }
  const d=new Date(), pad=n=>String(n).padStart(2,'0');
  const name='three-aces-backup-'+d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'-'+pad(d.getHours())+pad(d.getMinutes())+'.json';
  dl(name, JSON.stringify({app:'Three Aces Sales App', version:APP_VERSION,
    savedAt:d.toISOString(), data:tree, files:files||null}));
  toast('Backup downloaded — keep it somewhere safe (email it to yourself, or a USB stick)');
}
function restoreBackupPick(inp){
  const f=inp.files&&inp.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{
    let b; try{ b=JSON.parse(rd.result); }catch(e){ toast('That file is not a Three Aces backup',1); return; }
    const data=(b&&b.app==='Three Aces Sales App'&&b.data)? b.data : null;
    if(!data||!data.users||!data.items){ toast('That file is not a Three Aces backup',1); return; }
    const when=b.savedAt? new Date(b.savedAt).toLocaleString('en-CA') : 'an unknown date';
    pinConfirm('RESTORE the backup from '+when+'? This REPLACES everything currently in the database — items, stock, sales, users, money, books, attendance — with what is in that file. Every phone switches to it within seconds. This cannot be undone (unless you have a newer backup).',
      async ()=>{
        if(CLOUD){
          const r=await fetch(_restUrl([]),{method:'PUT',body:JSON.stringify(data)});
          if(!r.ok){ toast('Restore failed — check the connection',1); return; }
          if(b.files){ try{ await fetch(FIREBASE_CONFIG.databaseURL.replace(/\/+$/,'')+'/threeacesFiles.json',{method:'PUT',body:JSON.stringify(b.files)}); }catch(e){} }
          _lastJson='';
          S=Object.assign({items:{},users:{},sales:{},settings:{},restocks:{},payments:{}}, data);
        }else{
          S=Object.assign({items:{},users:{},sales:{},settings:{},restocks:{},payments:{}}, data);
          if(b.files) localStorage.setItem('threeacesFiles',JSON.stringify(b.files));
          DB._persist();
        }
        if(me && !S.users[me]) me=null;
        toast('Backup restored — everything is back to '+when);
      });
  };
  rd.readAsText(f); inp.value='';
}

    <p class="muted">Downloads everything — items, stock, sales, users, money, books, attendance, invoice files — to this device. Do it before every event and after big changes. If disaster ever strikes, Restore puts it all back exactly as it was.</p>
    <div class="rowbtns">
      <button class="btn" onclick="downloadBackup()">⬇ Download full backup</button>
    </div>
    <div class="rowbtns">
      <button class="btn red" onclick="$('restFile').click()">⬆ Restore from a backup file… (PIN)</button>
    </div>
    <input type="file" id="restFile" accept=".json,application/json" style="display:none" onchange="restoreBackupPick(this)">
    </div>
    <div class="card">
    <b>Export</b>

      <button class="btn gray" onclick="exportSalesCSV()">⬇ Sales CSV</button>
